name: Docker

# Build and publish the Prost image to Docker Hub on every push to main.
on:
  push:
    branches: [main]
    # Skip doc-only / CI-only churn that can't affect the image.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch: {}

# A newer push to main supersedes an in-flight build.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: thomastsoi/prost

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags & labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          # Publish `latest` plus the full git commit SHA.
          tags: |
            type=raw,value=latest
            type=raw,value=${{ github.sha }}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Speed up subsequent builds with the GitHub Actions layer cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max

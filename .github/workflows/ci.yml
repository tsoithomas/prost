name: CI

# Conventional-commit driven versioning (see .releaserc.json):
#   feat:     -> minor (0.x.0)
#   fix/perf: -> patch (0.x.y)
#   BREAKING CHANGE: -> major
#
# `build` runs on every push to main and every PR. `release` runs only after
# `build` passes on main, and bumps package.json's version, updates
# CHANGELOG.md, tags the commit, and creates a GitHub Release.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    # Live PostgreSQL and MySQL for the driver conformance suites (apps/api/.../*-driver.contract.test.ts).
    # Match docker-compose's demo targets: Postgres on 5434, MySQL on 3307, both demo/demo/demo.
    # Each suite creates its own schema/table, so no init SQL is needed. The Test step sets
    # REQUIRE_LIVE_DRIVER_CONTRACTS=true so a missing/unhealthy engine fails CI instead of skipping.
    services:
      demo-target-postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: demo
          POSTGRES_PASSWORD: demo
          POSTGRES_DB: demo
        ports:
          - 5434:5432
        options: >-
          --health-cmd "pg_isready -U demo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      demo-target-mysql:
        image: mysql:8.0.39
        env:
          MYSQL_ROOT_PASSWORD: demo
          MYSQL_DATABASE: demo
          MYSQL_USER: demo
          MYSQL_PASSWORD: demo
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -u demo -pdemo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @prost/api prisma:generate

      - name: Build
        run: pnpm -w build

      - name: Typecheck
        run: pnpm -w typecheck

      - name: Lint
        run: pnpm -w lint

      - name: Test
        run: pnpm -w test
        env:
          # Both live engines are mandatory in CI — the contract suites fail rather than skip.
          REQUIRE_LIVE_DRIVER_CONTRACTS: 'true'
          CONTRACT_PG_HOST: localhost
          CONTRACT_PG_PORT: '5434'
          CONTRACT_MYSQL_HOST: localhost
          CONTRACT_MYSQL_PORT: '3307'

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release: push version bump + tags, create Releases
      issues: write # semantic-release github plugin comments
      pull-requests: write # semantic-release github plugin comments
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for semantic-release

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

name: CI

# Conventional-commit driven versioning (see .releaserc.json):
#   feat:     -> minor (0.x.0)
#   fix/perf: -> patch (0.x.y)
#   BREAKING CHANGE: -> major
#
# `build` runs on every push to main and every PR. `release` runs only after
# `build` passes on main, and bumps package.json's version, updates
# CHANGELOG.md, tags the commit, and creates a GitHub Release.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @prost/api prisma:generate

      - name: Build
        run: pnpm -w build

      - name: Lint
        run: pnpm -w lint

      - name: Test
        run: pnpm -w test

  release:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write # semantic-release: push version bump + tags, create Releases
      issues: write # semantic-release github plugin comments
      pull-requests: write # semantic-release github plugin comments
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for semantic-release

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release

# The Prost application DB is now file-based SQLite (apps/api/prisma/data/prost.db) — no service
# here. This compose file only provides a demo *target* database for manually testing connections.
services:
  demo-target-postgres:
    image: postgres:16-alpine
    container_name: demo-target-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: demo
    ports:
      - "5434:5432"
    volumes:
      - demo-target-postgres-data:/var/lib/postgresql/data
      - ./docker/demo-target-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

volumes:
  demo-target-postgres-data:
